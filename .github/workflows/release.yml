name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on any tag like v1.0.0, v1.2.3, etc.

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller SexytexBdoLauncher.spec --noconfirm

      - name: Copy assets into dist folder
        shell: pwsh
        run: |
          Copy-Item "nvidiaProfileInspector" "dist\SexytexBdoLauncher\nvidiaProfileInspector" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "profiles"               "dist\SexytexBdoLauncher\profiles"               -Recurse -Force -ErrorAction SilentlyContinue

      - name: Create release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "SexytexBdoLauncher-$tag.zip"
          Compress-Archive -Path "dist\SexytexBdoLauncher" -DestinationPath $zipName -Force
          echo "ASSET=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
